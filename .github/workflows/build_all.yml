name: Build A full Release

on:
  release:
    types: [published]

jobs:
  buildAndTestForLinuxBasedPlatforms:
    name: Build for ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneLinux64 # Build a Linux 64-bit standalone.
            architecture: linux-64
            name: test-project-linux-64
            build_profile: 'Assets/Settings/Build Profiles/Linux.asset'
    env:
      CONDA_ARCH_OVERRIDE: ${{ matrix.architecture }} 

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.name }}
          restore-keys: |
            Library${{ matrix.name }}
            Library-


      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          versioning: Custom
          version: ${{ github.event.release.tag_name }}
          buildName: ${{ matrix.name }}
          buildProfile: ${{ matrix.build_profile }}

      - name: Create release archive
        run: |
          cd build
          zip -r --symlinks ../${{ matrix.name }}-${{ github.event.release.tag_name }}.zip ./${{ matrix.targetPlatform }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-${{ github.event.release.tag_name }}.zip

  buildForWindowsBasedPlatforms:
    name: Build for ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform:  StandaloneWindows64 # Build a windows 64-bit standalone.
            architecture: win-64
            name: test-project-win-64
            build_profile: 'Assets\Settings\Build Profiles\Windows.asset'

    env:
      CONDA_ARCH_OVERRIDE: ${{ matrix.architecture }}
          
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.name }}
          restore-keys: |
            Library${{ matrix.name }}
            Library-


      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          versioning: Custom
          version: ${{ github.event.release.tag_name }}
          buildName: ${{ matrix.name }}
          buildProfile: ${{ matrix.build_profile }}
          
      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path ./build/${{ matrix.targetPlatform }} -DestinationPath ./${{ matrix.name }}-${{ github.event.release.tag_name }}.zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-${{ github.event.release.tag_name }}.zip

  buildForMacOSBasedPlatforms:
    name: Build for ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneOSX # Build a macOS standalone.
            architecture: osx-64
            name: test-project-osx-64
            build_profile: 'Assets/Settings/Build Profiles/macOS.asset'
          - targetPlatform: StandaloneOSX
            architecture: osx-arm64
            name: test-project-osx-arm64
            build_profile: 'Assets/Settings/Build Profiles/macOS Silicon.asset'

    env:
      CONDA_ARCH_OVERRIDE: ${{ matrix.architecture }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.name }}
          restore-keys: |
            Library${{ matrix.name }}
            Library-


      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          versioning: Custom
          version: ${{ github.event.release.tag_name }}
          buildName: ${{ matrix.name }}
          buildProfile: ${{ matrix.build_profile }}

      - name: Create release archive
        run: |
          cd build
          zip -r --symlinks ../${{ matrix.name }}-${{ github.event.release.tag_name }}.zip ./${{ matrix.targetPlatform }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-${{ github.event.release.tag_name }}.zip
